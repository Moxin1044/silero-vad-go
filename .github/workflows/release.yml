name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build example
        run: |
          go build -ldflags "-s -w" -o example.exe ./example
          go version

      - name: Verify artifacts
        shell: pwsh
        run: |
          Write-Host "Artifacts to publish:"
          Get-ChildItem example.exe, onnxruntime.dll, silero_vad.onnx | Format-Table Name, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: silero-vad-go-${{ github.ref_name }}
          path: |
            example.exe
            onnxruntime.dll
            silero_vad.onnx

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: silero-vad-go-${{ github.ref_name }}
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/example.exe
            artifacts/onnxruntime.dll
            artifacts/silero_vad.onnx
